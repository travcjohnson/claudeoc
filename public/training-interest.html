<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free AI Training — ClaudeOC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #141413; color: #FAF9F5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #1c1b1a; border: 1px solid rgba(250,249,245,0.08); border-radius: 16px; padding: 40px 32px; max-width: 420px; width: 100%; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .sub { font-size: 15px; color: #a8a29e; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #a8a29e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid rgba(250,249,245,0.1); background: #242320; color: #FAF9F5; font-size: 16px; font-family: 'Inter', sans-serif; margin-bottom: 16px; outline: none; }
  input:focus, select:focus { border-color: #d97757; }
  .check-group { margin-bottom: 16px; }
  .check-group label { display: flex; align-items: center; gap: 10px; font-size: 15px; text-transform: none; letter-spacing: 0; color: #FAF9F5; font-weight: 400; margin-bottom: 10px; cursor: pointer; }
  .check-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #d97757; flex-shrink: 0; }
  button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #d97757; color: #FAF9F5; font-size: 16px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #c5634a; }
  .footer { text-align: center; margin-top: 16px; font-size: 12px; color: #666; }
  select option { background: #242320; color: #FAF9F5; }
</style>
</head>
<body>

<div class="card">
  <h1>Free AI Training</h1>
  <p class="sub">10 free Lunch & Learns for OC companies. 60–90 min, in-person.</p>

  <form action="https://formsubmit.co/travis@aurapathai.com" method="POST">
    <!-- FormSubmit config -->
    <input type="hidden" name="_subject" value="New Training Interest — ClaudeOC">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_next" value="https://claudeoc.com/training-thanks">
    <input type="text" name="_honey" style="display:none">

    <label>Email or Phone</label>
    <input type="text" name="contact" placeholder="you@company.com or phone" required>

    <label>Company Name</label>
    <input type="text" name="company" placeholder="Your company" required>

    <label>Company Size</label>
    <select name="size" required>
      <option value="" disabled selected>Select</option>
      <option value="1-19">1–19</option>
      <option value="20-49">20–49</option>
      <option value="50-99">50–99</option>
      <option value="100-499">100–499</option>
      <option value="500+">500+</option>
    </select>

    <label style="margin-bottom: 10px;">Interested In</label>
    <div class="check-group">
      <label><input type="checkbox" name="interest" value="Claude Code"> Claude Code Training</label>
      <label><input type="checkbox" name="interest" value="Claude Cowork"> Claude Cowork Training</label>
    </div>

    <button type="submit">I'm Interested</button>
  </form>

  <p class="footer">ClaudeOC &middot; Supported by Anthropic</p>
</div>

</body>
</html>
